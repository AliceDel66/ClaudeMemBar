name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build macOS release assets
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release package
        run: ./scripts/package-release.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release/RELEASE_NOTES.md
          files: |
            dist/release/ClaudeMemBar-*.pkg
            dist/release/ClaudeMemBar-*-macOS.zip
